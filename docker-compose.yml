version: '3'

services:
  web:
    build: .
    command: python3 manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    links:
      - postgres:postgres
  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=switchboard012
      - POSTGRES_USER=switchboard
      - POSTGRES_DB=switchboard
